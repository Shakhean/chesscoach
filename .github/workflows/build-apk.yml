name: Build Flet APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flet[apk]

    - name: Build APK
      run: |
        flet build apk main.py --release --output build/chess_flet_app.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: chess-flet-apk
        path: build/chess_flet_app.apk